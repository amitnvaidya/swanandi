<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Summer Quest — Galaxy Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #1a1147;
    --bg-mid: #2d1b69;
    --bg-soft: #2a1b5e;
    --card: #34206e;
    --card-hi: #3f2780;
    --line: #4c3399;
    --line-bright: #6b46c1;
    --ink: #f3eeff;
    --ink-dim: #b9a8ec;
    --gold: #ffd93f;
    --gold-deep: #f5b400;
    --pink: #ff2d92;
    --pink-deep: #d1006e;
    --pink-soft: #ff6fc2;
    --c-academic: #5ee7ff;
    --c-academic-deep:#0fb8d9;
    --c-sport: #ff6b9d;
    --c-sport-deep:#e8447a;
    --c-meals: #ff2d92;
    --c-meals-deep:#c4006e;
    --c-chess: #a78bfa;
    --c-chess-deep:#7c3aed;
    --c-writing: #ffd93f;
    --c-writing-deep:#f0a500;
    --c-music: #4ee6b8;
    --c-music-deep:#0fb88a;
  }
  *{-webkit-tap-highlight-color: transparent;}
  html,body{
    background:
      radial-gradient(ellipse 900px 600px at 15% -5%, #ff2d9233 0%, transparent 55%),
      radial-gradient(ellipse 800px 700px at 90% 10%, #5ee7ff22 0%, transparent 50%),
      radial-gradient(ellipse 1000px 900px at 50% 100%, #a78bfa2a 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #241257 100%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .font-display{ font-family: 'Baloo 2', sans-serif; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
  .safe-top{ padding-top: env(safe-area-inset-top); }
  .safe-bottom{ padding-bottom: env(safe-area-inset-bottom); }

  #sparkle-layer{
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .sparkle{
    position:absolute; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--pink-soft) 45%, transparent 75%);
    opacity: 0; animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity: 0; transform: scale(0.4); }
    50%{ opacity: var(--max-op, 0.85); transform: scale(1); }
  }
  .sparkle.gold{ background: radial-gradient(circle, #fff 0%, var(--gold) 45%, transparent 75%); }
  .sparkle.cyan{ background: radial-gradient(circle, #fff 0%, var(--c-academic) 45%, transparent 75%); }

  #shell{
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .affirm-rail{
    display: none;
    width: 220px;
    flex-shrink: 0;
    padding: 24px 14px;
    flex-direction: column;
    gap: 18px;
    position: sticky;
    top: 0;
    align-self: flex-start;
    max-height: 100vh;
    overflow: hidden;
  }
  @media (min-width: 900px){
    .affirm-rail{ display: flex; }
  }
  .affirm-card{
    background: linear-gradient(160deg, rgba(255,111,194,0.14), rgba(167,139,250,0.10));
    border: 1px solid rgba(255,111,194,0.35);
    border-radius: 18px;
    padding: 14px 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--pink-soft);
    opacity: 0;
    animation: affirm-cycle 42s ease-in-out infinite;
    text-shadow: 0 0 18px rgba(255,111,194,0.25);
  }
  @keyframes affirm-cycle{
    0%{ opacity:0; transform: translateY(6px); }
    4%{ opacity:1; transform: translateY(0); }
    88%{ opacity:1; }
    96%{ opacity:0; transform: translateY(-6px); }
    100%{ opacity:0; }
  }

  #affirm-strip{
    display: block;
    overflow-x: auto;
    white-space: nowrap;
    padding: 10px 14px;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 900px){
    #affirm-strip{ display: none; }
  }
  .affirm-chip{
    display: inline-block;
    background: linear-gradient(160deg, rgba(255,111,194,0.16), rgba(167,139,250,0.12));
    border: 1px solid rgba(255,111,194,0.4);
    border-radius: 14px;
    padding: 8px 14px;
    margin-right: 8px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    color: var(--pink-soft);
    white-space: normal;
    max-width: 240px;
  }

  .main-col{ width: 100%; max-width: 640px; flex-shrink: 0; }
  .relative-content{ position: relative; z-index: 1; }

  .quest-card{
    background: linear-gradient(165deg, var(--card-hi), var(--card));
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 10px 28px -14px rgba(10,5,30,0.7);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .quest-card:active{ transform: scale(0.985); }
  .quest-card.done{
    border-color: color-mix(in srgb, var(--accent) 60%, var(--line));
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent) inset, 0 10px 28px -14px rgba(10,5,30,0.7);
  }

  .check-box{
    width: 44px; height:44px; min-width:44px; border-radius: 14px;
    border: 2.5px solid var(--line-bright);
    display:flex; align-items:center; justify-content:center;
    transition: all .15s cubic-bezier(.34,1.56,.64,1);
    background: rgba(255,255,255,0.03);
  }
  .check-box.checked{
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05) rotate(-3deg);
    box-shadow: 0 0 16px -2px var(--accent);
  }
  .check-box.checked svg{ stroke: #1a1147; }

  .tab-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; flex:1; padding: 8px 2px 6px; color: var(--ink-dim);
    transition: color .15s ease, transform .12s ease; min-height: 56px;
  }
  .tab-btn.active{ color: var(--pink-soft); }
  .tab-btn:active{ transform: scale(0.93); }
  .tab-pill{
    position:absolute; bottom: 100%; margin-bottom:4px; width: 30px; height:4px;
    border-radius:99px; background: var(--pink); opacity:0; transition: opacity .15s ease;
    box-shadow: 0 0 10px var(--pink);
  }
  .tab-btn.active .tab-pill{ opacity:1; }

  .progress-track{ background: rgba(255,255,255,0.08); border-radius: 99px; overflow:hidden; }
  .progress-fill{
    height:100%; border-radius:99px;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    transition: width .5s cubic-bezier(.16,1,.3,1);
    box-shadow: 0 0 10px -1px var(--accent);
  }

  .token-chip{
    background: linear-gradient(165deg, #4a2090, #2e1568);
    border: 1.5px solid var(--pink);
    box-shadow: 0 0 14px -4px var(--pink);
  }

  .lvl-ring{ background: conic-gradient(var(--pink) calc(var(--pct) * 1%), rgba(255,255,255,0.1) 0); }

  .shop-card{
    background: linear-gradient(160deg, var(--card-hi), var(--card));
    border: 1px solid var(--line); border-radius: 22px;
  }
  .shop-card.affordable{ border-color: color-mix(in srgb, var(--gold) 55%, var(--line)); box-shadow: 0 0 18px -8px var(--gold); }
  .shop-card.locked{ opacity: 0.45; }
  .shop-card.weekgate{ border-color: color-mix(in srgb, var(--pink) 55%, var(--line)); }

  .btn-press{ transition: transform .1s ease; }
  .btn-press:active{ transform: scale(0.95); }

  .category-glow{ box-shadow: 0 0 44px -10px var(--accent); }
  input[type=number]::-webkit-inner-spin-button{ opacity:1; }
  ::selection{ background: var(--pink); color:#1a1147; }

  @keyframes pop-in{ 0%{ transform: scale(0.85); opacity:0;} 100%{ transform: scale(1); opacity:1; } }
  .pop-in{ animation: pop-in .25s cubic-bezier(.34,1.56,.64,1); }

  @keyframes slide-in-left{ 0%{ opacity:0; transform: translateX(-20px); } 100%{ opacity:1; transform: translateX(0); } }
  .slide-in-left{ animation: slide-in-left .3s ease; }

  @keyframes bounce-rise{ 0%{ opacity:0; transform: translateY(12px); } 100%{ opacity:1; transform: translateY(0); } }
  .bounce-rise{ animation: bounce-rise .4s cubic-bezier(.34,1.56,.64,1); }

  @keyframes float{ 0%, 100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }
  .float{ animation: float 3s ease-in-out infinite; }

  @media (max-width: 640px){ .affirm-rail{ display:none; } }
</style>
</head>
<body class="safe-top safe-bottom">

<div id="sparkle-layer"></div>

<div id="shell">
  <div class="affirm-rail" id="affirm-rail"></div>
  <div id="affirm-strip" class="flex"></div>
  
  <div class="main-col relative-content">
    <div class="px-4 py-6 space-y-4">
      
      <!-- Header with Avatar & Level -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-14 h-14 rounded-full bg-gradient-to-br from-pink to-c-music flex items-center justify-center flex-shrink-0">
            <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
          </div>
          <div>
            <h1 class="font-display text-xl font-bold text-ink">Summer Quest</h1>
            <p class="text-sm text-ink-dim">Galaxy Quest Edition</p>
          </div>
        </div>
        <button onclick="openSettings()" class="p-2 rounded-lg hover:bg-white/5 transition">
          <svg class="w-6 h-6 text-ink-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>

      <!-- Token Balance & Progress -->
      <div class="grid grid-cols-2 gap-3">
        <div class="quest-card p-4">
          <div class="text-xs text-ink-dim font-medium mb-2">⭐ TOKENS</div>
          <div class="text-2xl font-display font-bold text-gold" id="token-count">0</div>
        </div>
        <div class="quest-card p-4">
          <div class="text-xs text-ink-dim font-medium mb-2">🎯 LEVEL</div>
          <div class="text-2xl font-display font-bold text-pink" id="level-count">1</div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="quest-card p-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-medium text-ink-dim">PROGRESS TO NEXT LEVEL</span>
          <span class="text-xs font-bold text-gold" id="progress-text">0/100</span>
        </div>
        <div class="progress-track h-2">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Tab Navigation -->
      <div class="flex gap-1 bg-white/3 p-1 rounded-xl">
        <button onclick="switchTab('quests')" class="tab-btn active" id="tab-quests">
          <div class="tab-pill"></div>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span class="text-xs font-medium">Quests</span>
        </button>
        <button onclick="switchTab('shop')" class="tab-btn" id="tab-shop">
          <div class="tab-pill"></div>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="text-xs font-medium">Shop</span>
        </button>
      </div>

      <!-- Quests Tab -->
      <div id="quests-tab" class="space-y-3">
        <div id="quests-container"></div>
        <button onclick="openAddQuest()" class="w-full quest-card p-4 text-center text-pink hover:text-pink-soft transition flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span class="font-medium">Add New Quest</span>
        </button>
      </div>

      <!-- Shop Tab -->
      <div id="shop-tab" class="hidden space-y-3">
        <div id="shop-container"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: Add Quest -->
<div id="modal-add-quest" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end z-50">
  <div class="w-full max-w-lg bg-gradient-to-t from-bg-deep to-bg-mid rounded-t-3xl p-6 space-y-4 animate-in slide-in-from-bottom">
    <h2 class="font-display text-lg font-bold">New Quest</h2>
    <input type="text" id="quest-name-input" placeholder="Quest name..." class="w-full bg-white/5 border border-line rounded-xl px-4 py-3 text-ink placeholder-ink-dim focus:outline-none focus:border-pink">
    <input type="number" id="quest-tokens-input" placeholder="Tokens (default: 10)" class="w-full bg-white/5 border border-line rounded-xl px-4 py-3 text-ink placeholder-ink-dim focus:outline-none focus:border-pink" value="10">
    <div class="flex gap-3">
      <button onclick="closeModal('modal-add-quest')" class="flex-1 py-3 rounded-xl bg-white/5 text-ink-dim font-medium">Cancel</button>
      <button onclick="addQuest()" class="flex-1 py-3 rounded-xl bg-pink text-white font-bold">Create</button>
    </div>
  </div>
</div>

<!-- Modal: Shop Item Detail -->
<div id="modal-purchase" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-gradient-to-b from-bg-mid to-bg-deep rounded-3xl p-6 max-w-xs space-y-4">
    <h2 class="font-display text-lg font-bold" id="purchase-name">Item Name</h2>
    <p class="text-sm text-ink-dim" id="purchase-desc">Description</p>
    <div class="flex justify-between items-center py-3 border-t border-b border-line">
      <span class="text-ink-dim">Cost</span>
      <span class="text-lg font-bold text-gold" id="purchase-cost">100</span>
    </div>
    <div class="flex gap-3">
      <button onclick="closeModal('modal-purchase')" class="flex-1 py-3 rounded-xl bg-white/5 text-ink-dim font-medium">Cancel</button>
      <button onclick="confirmPurchase()" class="flex-1 py-3 rounded-xl bg-pink text-white font-bold" id="purchase-btn">Buy</button>
    </div>
  </div>
</div>

<!-- Modal: Settings -->
<div id="modal-settings" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end z-50">
  <div class="w-full max-w-lg bg-gradient-to-t from-bg-deep to-bg-mid rounded-t-3xl p-6 space-y-4">
    <h2 class="font-display text-lg font-bold">Settings</h2>
    <div class="space-y-3">
      <label class="block">
        <span class="text-sm text-ink-dim">Your Name</span>
        <input type="text" id="settings-name" placeholder="Enter your name" class="w-full mt-2 bg-white/5 border border-line rounded-xl px-4 py-3 text-ink placeholder-ink-dim focus:outline-none focus:border-pink">
      </label>
      <label class="block">
        <span class="text-sm text-ink-dim">Target Level</span>
        <input type="number" id="settings-target-level" placeholder="Set target level" class="w-full mt-2 bg-white/5 border border-line rounded-xl px-4 py-3 text-ink placeholder-ink-dim focus:outline-none focus:border-pink" value="10">
      </label>
    </div>
    <div class="flex gap-3 pt-4">
      <button onclick="closeModal('modal-settings')" class="flex-1 py-3 rounded-xl bg-white/5 text-ink-dim font-medium">Done</button>
      <button onclick="saveSettings()" class="flex-1 py-3 rounded-xl bg-pink text-white font-bold">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================
// FIREBASE CONFIGURATION (ORIGINAL)
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyDj_FDbLXQV-_J4W2LB3QBxrZj0nGx6A4Q",
  authDomain: "summer-quest-d0ca6.firebaseapp.com",
  databaseURL: "https://summer-quest-d0ca6-default-rtdb.firebaseio.com",
  projectId: "summer-quest-d0ca6",
  storageBucket: "summer-quest-d0ca6.appspot.com",
  messagingSenderId: "999047897906",
  appId: "1:999047897906:web:d13b2e61b4e0e84a56e7ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('summer-quest');

// ============================================
// STATE MANAGEMENT
// ============================================
let currentUser = "User";
let tokens = 0;
let level = 1;
let questsData = [];
let shopData = [];
let currentTab = "quests";

// ============================================
// INITIALIZATION
// ============================================
document.addEventListener("DOMContentLoaded", () => {
  loadFromFirebase();
  setupAffirmations();
  generateSparkles();
  setInterval(generateSparkles, 3000);
});

// ============================================
// FIREBASE SYNC
// ============================================
function loadFromFirebase() {
  dbRef.child("user").once("value", (snapshot) => {
    if (snapshot.exists()) {
      const userData = snapshot.val();
      currentUser = userData.name || "User";
      tokens = userData.tokens || 0;
      level = userData.level || 1;
      updateUI();
    }
  });

  dbRef.child("quests").once("value", (snapshot) => {
    questsData = snapshot.exists() ? Object.entries(snapshot.val()).map(([id, quest]) => ({ id, ...quest })) : [];
    renderQuests();
  });

  dbRef.child("shop").once("value", (snapshot) => {
    shopData = snapshot.exists() ? Object.entries(snapshot.val()).map(([id, item]) => ({ id, ...item })) : [];
    renderShop();
  });
}

function saveToFirebase() {
  dbRef.child("user").set({ name: currentUser, tokens, level });
}

// ============================================
// UI RENDERING
// ============================================
function updateUI() {
  document.getElementById("token-count").textContent = tokens;
  document.getElementById("level-count").textContent = level;
  const progress = tokens % 100;
  document.getElementById("progress-fill").style.width = progress + "%";
  document.getElementById("progress-text").textContent = `${progress}/100`;
}

function renderQuests() {
  const container = document.getElementById("quests-container");
  container.innerHTML = questsData.map(quest => `
    <div class="quest-card p-4 flex items-center gap-4 ${quest.completed ? 'done' : ''}" style="--accent: var(--pink); --accent-deep: var(--pink-deep);">
      <button onclick="toggleQuest('${quest.id}')" class="check-box ${quest.completed ? 'checked' : ''}">
        ${quest.completed ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
      </button>
      <div class="flex-1">
        <h3 class="font-medium text-ink">${quest.name}</h3>
        <p class="text-xs text-ink-dim">+${quest.tokens} tokens</p>
      </div>
      <button onclick="deleteQuest('${quest.id}')" class="text-ink-dim hover:text-pink transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
    </div>
  `).join("");
}

function renderShop() {
  const container = document.getElementById("shop-container");
  container.innerHTML = shopData.map(item => `
    <div class="shop-card p-4 ${tokens >= item.cost ? 'affordable' : 'locked'}">
      <div class="flex items-start justify-between">
        <div class="flex-1">
          <h3 class="font-medium text-ink">${item.name}</h3>
          <p class="text-xs text-ink-dim mt-1">${item.description}</p>
        </div>
        <div class="text-right">
          <div class="text-lg font-bold text-gold">${item.cost}</div>
          <button onclick="buyItem('${item.id}', '${item.name}', ${item.cost})" class="mt-2 px-3 py-2 rounded-lg text-xs font-medium ${tokens >= item.cost ? 'bg-pink text-white hover:bg-pink-soft' : 'bg-white/5 text-ink-dim'} transition">
            ${tokens >= item.cost ? 'Buy' : 'Locked'}
          </button>
        </div>
      </div>
    </div>
  `).join("");
}

// ============================================
// QUEST ACTIONS
// ============================================
function toggleQuest(questId) {
  const quest = questsData.find(q => q.id === questId);
  if (quest) {
    if (!quest.completed) {
      tokens += quest.tokens;
      confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });
    }
    quest.completed = !quest.completed;
    dbRef.child(`quests/${questId}`).set(quest);
    updateUI();
    renderQuests();
    saveToFirebase();
  }
}

function deleteQuest(questId) {
  questsData = questsData.filter(q => q.id !== questId);
  dbRef.child(`quests/${questId}`).remove();
  renderQuests();
}

function addQuest() {
  const name = document.getElementById("quest-name-input").value.trim();
  const tokens_val = parseInt(document.getElementById("quest-tokens-input").value) || 10;
  if (!name) return;
  
  const newQuest = { name, tokens: tokens_val, completed: false };
  const newId = dbRef.child("quests").push().key;
  dbRef.child(`quests/${newId}`).set(newQuest);
  questsData.push({ id: newId, ...newQuest });
  
  document.getElementById("quest-name-input").value = "";
  document.getElementById("quest-tokens-input").value = "10";
  closeModal("modal-add-quest");
  renderQuests();
}

// ============================================
// SHOP ACTIONS
// ============================================
function buyItem(itemId, name, cost) {
  if (tokens >= cost) {
    document.getElementById("purchase-name").textContent = name;
    document.getElementById("purchase-cost").textContent = cost;
    document.getElementById("purchase-btn").onclick = () => {
      tokens -= cost;
      saveToFirebase();
      updateUI();
      renderShop();
      closeModal("modal-purchase");
      confetti({ particleCount: 100, spread: 80 });
    };
    openModal("modal-purchase");
  }
}

function confirmPurchase() {
  document.getElementById("purchase-btn").click();
}

// ============================================
// MODAL HELPERS
// ============================================
function openModal(modalId) {
  document.getElementById(modalId).classList.remove("hidden");
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.add("hidden");
}

function openAddQuest() {
  openModal("modal-add-quest");
}

function openSettings() {
  document.getElementById("settings-name").value = currentUser;
  openModal("modal-settings");
}

function saveSettings() {
  currentUser = document.getElementById("settings-name").value || "User";
  saveToFirebase();
  closeModal("modal-settings");
}

// ============================================
// TAB NAVIGATION
// ============================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById("quests-tab").classList.toggle("hidden", tab !== "quests");
  document.getElementById("shop-tab").classList.toggle("hidden", tab !== "shop");
  document.getElementById("tab-quests").classList.toggle("active", tab === "quests");
  document.getElementById("tab-shop").classList.toggle("active", tab === "shop");
}

// ============================================
// SPARKLES & EFFECTS
// ============================================
function generateSparkles() {
  const layer = document.getElementById("sparkle-layer");
  const sparkleCount = Math.random() > 0.6 ? 1 : 0;
  for (let i = 0; i < sparkleCount; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = `sparkle ${["gold", "cyan", ""].sort(() => Math.random() - 0.5)[0]}`;
    const size = Math.random() * 6 + 2;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";
    sparkle.style.left = Math.random() * 100 + "%";
    sparkle.style.top = Math.random() * 100 + "%";
    sparkle.style.setProperty("--max-op", Math.random() * 0.4 + 0.4);
    sparkle.style.animationDuration = (Math.random() * 3 + 2) + "s";
    sparkle.style.animationDelay = Math.random() * 0.5 + "s";
    layer.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 5000);
  }
}

function setupAffirmations() {
  const affirmations = [
    "You're doing amazing! 🌟",
    "Every quest brings you closer! 🚀",
    "Keep the momentum going! 💪",
    "You've got this! ⭐",
    "Progress over perfection! 📈"
  ];
  
  const rail = document.getElementById("affirm-rail");
  const strip = document.getElementById("affirm-strip");
  
  affirmations.forEach((text, i) => {
    const card = document.createElement("div");
    card.className = "affirm-card";
    card.textContent = text;
    card.style.animationDelay = (i * 6) + "s";
    rail.appendChild(card);
    
    const chip = document.createElement("div");
    chip.className = "affirm-chip";
    chip.textContent = text;
    strip.appendChild(chip);
  });
}
</script>
